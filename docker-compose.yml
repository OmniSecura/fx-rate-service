services:
  db:
    image: mysql:8.4
    container_name: fx-rate-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: fx_rate_db
      MYSQL_USER: fx_user
      MYSQL_PASSWORD: fx_password
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
      - ./sql:/seed/sql:ro
      - ./data:/seed/data:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  app:
    build:
      context: ./spring-boot-app
      dockerfile: Dockerfile
    container_name: fx-rate-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/fx_rate_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: fx_user
      SPRING_DATASOURCE_PASSWORD: fx_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_SHOW_SQL: "false"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/currencies > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 40s

volumes:
  mysql_data:

