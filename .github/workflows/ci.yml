name: Java CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run Maven verify
        working-directory: spring-boot-app
        run: mvn -B clean verify

      - name: Upload JaCoCo merged report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-merged-report
          path: spring-boot-app/target/site/jacoco-merged/